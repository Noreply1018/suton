services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: suton-postgres
    environment:
      POSTGRES_DB: suton
      POSTGRES_USER: suton
      POSTGRES_PASSWORD: suton
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suton -d suton"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - suton-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: suton-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  suton-postgres-data:
