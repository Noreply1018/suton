name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build, for example v0.1.0"
        required: false
        default: ""
      release_tag:
        description: "Optional release tag to backfill release image tags, for example v0.1.0"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAME: noreply1018/suton
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set build metadata
        id: build_meta
        env:
          DISPATCH_SOURCE_REF: ${{ inputs.source_ref }}
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${release_tag#v}"
            is_release=true
          elif [[ -n "${DISPATCH_RELEASE_TAG}" ]]; then
            if [[ ! "${DISPATCH_RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "error: release_tag must match vX.Y.Z, got: ${DISPATCH_RELEASE_TAG}" >&2
              exit 1
            fi
            if [[ "${DISPATCH_SOURCE_REF}" != "${DISPATCH_RELEASE_TAG}" && "${DISPATCH_SOURCE_REF}" != "refs/tags/${DISPATCH_RELEASE_TAG}" ]]; then
              echo "error: source_ref must point at the same tag as release_tag for release backfill" >&2
              echo "error: expected source_ref=${DISPATCH_RELEASE_TAG} or refs/tags/${DISPATCH_RELEASE_TAG}, got: ${DISPATCH_SOURCE_REF}" >&2
              exit 1
            fi
            release_tag="${DISPATCH_RELEASE_TAG}"
            version="${release_tag#v}"
            is_release=true
          else
            release_tag=""
            version=edge
            is_release=false
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract GHCR metadata
        id: meta_ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.build_meta.outputs.release_tag }},enable=${{ steps.build_meta.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.build_meta.outputs.release_tag }},enable=${{ steps.build_meta.outputs.is_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.build_meta.outputs.is_release == 'true' }}
            type=raw,value=edge,enable=${{ steps.build_meta.outputs.is_release != 'true' }}

      - name: Extract Docker Hub metadata
        id: meta_dockerhub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.build_meta.outputs.release_tag }},enable=${{ steps.build_meta.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.build_meta.outputs.release_tag }},enable=${{ steps.build_meta.outputs.is_release == 'true' }}
            type=raw,value=latest,enable=${{ steps.build_meta.outputs.is_release == 'true' }}
            type=raw,value=edge,enable=${{ steps.build_meta.outputs.is_release != 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SUTON_VERSION=${{ steps.build_meta.outputs.version }}
            SUTON_COMMIT=${{ steps.build_meta.outputs.commit }}
            SUTON_BUILD_DATE=${{ steps.build_meta.outputs.date }}
            NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
          tags: |
            ${{ steps.meta_ghcr.outputs.tags }}
            ${{ steps.meta_dockerhub.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes from CHANGELOG
        id: changelog
        if: ${{ steps.build_meta.outputs.is_release == 'true' }}
        shell: bash
        run: ./scripts/extract-changelog-release.sh "${{ steps.build_meta.outputs.release_tag }}"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Suton ${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.changelog.outputs.release_body }}" \
            --verify-tag

      - name: Sync Docker Hub description
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && steps.build_meta.outputs.is_release == 'true' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Source-first study review app for tracing questions back to PDF pages."
          readme-filepath: ./docs/dockerhub-description.md
